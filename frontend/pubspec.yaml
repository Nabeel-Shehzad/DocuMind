name: documind
description: "DocuMind AI — Intelligent Document Processing with RAG + Claude AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management + routing
  get: ^4.6.6

  # HTTP client
  dio: ^5.7.0

  # File picker (PDF + images)
  file_picker: ^8.1.2

  # Markdown rendering (for Claude responses)
  flutter_markdown: ^0.7.3

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Lottie animations
  lottie: ^3.1.2

  # UUID for local IDs
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
